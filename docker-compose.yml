services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat_password
      POSTGRES_DB: chatdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    dns: 8.8.8.8
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: chat
      DB_PASSWORD: chat_password
      DB_NAME: chatdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ORIGIN: http://172.232.228.90:3000
    ports:
      - "4000:4000"

  frontend:
    dns: 8.8.8.8
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SOCKET_URL: http://172.232.228.90:4000
        NEXT_PUBLIC_API_URL: http://172.232.228.90:4000
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres_data:
